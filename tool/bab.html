<script>
    const themeBtn = document.getElementById('theme_btn');
    const THEME_COOKIE = 'page_theme';

    function setCookie(name, value, days) {
        const date = new Date();
        date.setTime(date.getTime() + days * 24 * 60 * 60 * 1000);
        document.cookie = `${name}=${value}; expires=${date.toUTCString()}; path=/`;
    }

    function getCookie(name) {
        const cookies = document.cookie.split('; ');
        const target = cookies.find(cookie => cookie.startsWith(name + '='));
        return target ? target.split('=')[1] : null;
    }

    function applyTheme(theme) {
        const isDark = theme === 'dark';

        document.body.classList.toggle('dark-mode', isDark);
        themeBtn.textContent = isDark ? '🌙' : '☀️';
    }

    function toggleTheme() {
        const isDark = document.body.classList.contains('dark-mode');
        const nextTheme = isDark ? 'light' : 'dark';

        applyTheme(nextTheme);
        setCookie(THEME_COOKIE, nextTheme, 365);
    }

    const savedTheme = getCookie(THEME_COOKIE) || 'dark';

    applyTheme(savedTheme);
    themeBtn.addEventListener('click', toggleTheme);

    // 이벤트
    const initIframeEventListeners = () => {
        const iframeBoxes = document.querySelectorAll('.iframe_box');
        const backPanel = document.querySelector('#back_panel');

        // --- [공통 함수] 모든 상태를 원래대로 되돌리는 함수 (원복) ---
        const closeAndReset = () => {
            // 1. 모든 .iframe_box에서 .on 클래스 제거
            iframeBoxes.forEach(el => el.classList.remove('on'));
            
            // 2. #back_panel 숨기기
            if (backPanel) {
                backPanel.style.display = 'none';
            }
        };

        // --- .iframe_box 클릭 시 활성화 ---
        iframeBoxes.forEach((box) => {
            box.addEventListener('click', (event) => {

                if (backPanel.style.display === 'block') return;

                event.currentTarget.classList.add('on');

                if (backPanel) {
                    backPanel.style.display = 'block';
                }
            });
        });

        // --- #back_panel을 클릭하면 원복 ---
        if (backPanel) {
            backPanel.addEventListener('click', () => {
                // 현재 back_panel이 보여지고 있는 상태(block)일 때만 실행
                if (backPanel.style.display === 'block') {
                    closeAndReset();
                }
            });
        }

        // --- ESC 키를 누르면 원복 ---
        window.addEventListener('keydown', (event) => {
            // ESC 키가 눌렸고, 동시에 #back_panel이 열려있는 상태(block)일 때만 실행
            if ( (event.keyCode === 27 || event.key === 'Escape') && backPanel && backPanel.style.display === 'block') {
                closeAndReset();
            }
        });
    };

        // 함수 실행
    initIframeEventListeners();
</script>
