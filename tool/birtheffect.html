<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>생일 축하 이펙트 테스트</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 20px;
    }

    .card {
      background: #ffffff;
      border: 1px solid #5f5a5c;
      border-radius: 20px;
      padding: 26px 32px;
      box-shadow: 0 12px 30px #c7c4c46c;
      backdrop-filter: blur(4px);
    }

    h1 {
      margin: 0 0 14px;
      font-size: 32px;
      line-height: 1.25;
      color: #3b3b3b;
    }

    p {
      margin: 0 0 14px;
      font-size: 16px;
      line-height: 1.7;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
    }

    .primary {
      background: #2b2b2b;
      color: #fff;
    }

    .secondary {
      background: #fff;
      color: #3b3b3b;
      border: 1px solid #ccc;
    }

    .status {
      margin-top: 24px;
      font-weight: 700;
      font-size: 13px;
      color: #3d6ced;
      padding-left: .6em;
    }

    .range-wrap {
      margin-top: 20px;
      width: 370px;
    }

    .range-label {
      display: inline-block;
      margin-bottom: 10px;
      font-size: 14px;
      font-weight: 700;
      color: #3b3b3b;
    }

    .range-input {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      margin: 0;
      border-radius: 999px;
      background: linear-gradient(90deg, #3d6ced 0%, #8fb0ff 100%);
      outline: none;
      cursor: pointer;
    }

    /* WebKit track */
    .range-input::-webkit-slider-runnable-track {
      height: 6px;
      border-radius: 999px;
      background: linear-gradient(90deg, #3d6ced 0%, #8fb0ff 100%);
    }

    /* WebKit thumb */
    .range-input::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      margin-top: -6px;
      border: 2px solid #ffffff;
      border-radius: 50%;
      background: #2b2b2b;
      box-shadow: 0 2px 8px rgba(43, 43, 43, 0.22);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .range-input:hover::-webkit-slider-thumb {
      transform: scale(1.06);
      box-shadow: 0 4px 12px rgba(43, 43, 43, 0.28);
    }

    .range-input:active::-webkit-slider-thumb {
      transform: scale(1.12);
    }

    /* Firefox track */
    .range-input::-moz-range-track {
      height: 6px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(90deg, #3d6ced 0%, #8fb0ff 100%);
    }

    /* Firefox thumb */
    .range-input::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border: 2px solid #ffffff;
      border-radius: 50%;
      background: #2b2b2b;
      box-shadow: 0 2px 8px rgba(43, 43, 43, 0.22);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      cursor: pointer;
    }

    .range-input:hover::-moz-range-thumb {
      transform: scale(1.06);
      box-shadow: 0 4px 12px rgba(43, 43, 43, 0.28);
    }

    .range-input:active::-moz-range-thumb {
      transform: scale(1.12);
    }

    /* focus */
    .range-input:focus {
      outline: none;
    }

    .range-input:focus::-webkit-slider-thumb {
      box-shadow: 0 0 0 4px rgba(61, 108, 237, 0.18), 0 2px 8px rgba(43, 43, 43, 0.22);
    }

    .range-input:focus::-moz-range-thumb {
      box-shadow: 0 0 0 4px rgba(61, 108, 237, 0.18), 0 2px 8px rgba(43, 43, 43, 0.22);
    }

    .range-scale {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>생일 축하 이펙트 🎉🥳👏</h1>
      <p>기존 웹페이지에 생일 축하 분위기의 낙하 이펙트를 붙였을 때의 동작을 확인하기 위한 테스트 페이지</p>
      <p>이펙트는 기존 버튼 클릭이나 입력을 방해하지 않도록 처리</p>

      <div class="button-row">
        <button type="button" class="primary" onclick="startBlossomEffect(); setStatus('기본 15초 이펙트 실행');">기본 실행</button>
        <button type="button" class="primary" onclick="startBlossomEffect(60000); setStatus('60초 이펙트 실행');">60초 실행</button>
        <button type="button" class="secondary" onclick="stopBlossomEffect(); setStatus('이펙트 수동 종료');">수동 종료</button>
        <div class="range-wrap">
          <label for="effectAmount" class="range-label">이펙트 강도</label>
          <input id="effectAmount" class="range-input" type="range" min="1" max="10" step="0.05" value="1">
          <div class="range-scale">
            <span>1</span>
            <strong id="effectAmountStatus" style="color: red;">1</strong>
            <span>10</span>
          </div>
        </div>
      </div>

      <div class="status">[INFO] <span id="statusText">대기 중</span></div>
    </div>
  </div>

  <script>
    function setStatus(message) {
      document.getElementById('statusText').innerText = message;
    }

    (function () {
      var blossomCanvas = null;
      var animationId = null;
      var petals = [];
      var running = false;
      var stopTimer = null;
      var resizeBound = false;
      var ratio = 1;

      document.getElementById('effectAmount').addEventListener("input", function(e) {
        document.getElementById('effectAmountStatus').innerText = e.target.value;
        ratio = e.target.value;
      })

      function random(min, max) {
        return Math.random() * (max - min) + min;
      }

      function createCanvas() {
        if (blossomCanvas) {
          return blossomCanvas;
        }

        blossomCanvas = document.createElement('canvas');
        blossomCanvas.id = 'blossom-effect-canvas';
        blossomCanvas.style.position = 'fixed';
        blossomCanvas.style.left = '0';
        blossomCanvas.style.top = '0';
        blossomCanvas.style.width = '100%';
        blossomCanvas.style.height = '100%';
        blossomCanvas.style.pointerEvents = 'none';
        blossomCanvas.style.zIndex = '99999';
        blossomCanvas.style.background = 'transparent';

        document.body.appendChild(blossomCanvas);
        resizeCanvas();

        if (!resizeBound) {
          window.addEventListener('resize', resizeCanvas);
          resizeBound = true;
        }

        return blossomCanvas;
      }

      function resizeCanvas() {
        if (!blossomCanvas) {
          return;
        }

        var dpr = Math.min(window.devicePixelRatio || 1, 2);
        blossomCanvas.width = Math.floor(window.innerWidth * dpr);
        blossomCanvas.height = Math.floor(window.innerHeight * dpr);

        var ctx = blossomCanvas.getContext('2d');
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function randomCelebrationColor() {
        var colors = [
          '#ff9aa2', // soft pink
          '#ffb7b2', // peach
          '#ffdac1', // light orange
          '#e2f0cb', // pastel green
          '#b5ead7', // mint
          '#c7ceea', // lavender blue
          '#f3c4fb', // soft purple
          '#ffd6e0'  // light rose
        ];
        return colors[Math.floor(Math.random() * colors.length)];
      }

      function randomShapeType() {
        var shapes = ['circle', 'circle', 'circle', 'rect', 'rect', 'star'];
        return shapes[Math.floor(Math.random() * shapes.length)];
      }

      function randomEmoji() {
        var emojis = ['🎉', '🎂', '🥳'];
        return emojis[Math.floor(Math.random() * emojis.length)];
      }

      function buildParticleState(width, height, isReset) {
        var isEmoji = Math.random() < 0.04;

        return {
          x: random(0, width),
          y: isReset ? random(-120, -20) : random(-height, -20),
          size: random(8, 16),
          fallSpeed: random(2.6, 4.8),
          driftSpeed: random(-0.7, 0.7),
          swingSpeed: random(0.012, 0.035),
          swingRange: random(6, 16),
          swingOffset: random(0, Math.PI * 2),
          rotation: random(0, Math.PI * 2),
          rotationSpeed: random(-0.08, 0.08),
          alpha: random(0.65, 0.9),
          isEmoji: isEmoji,
          emoji: isEmoji ? randomEmoji() : null,
          color: isEmoji ? null : randomCelebrationColor(),
          shapeType: isEmoji ? null : randomShapeType()
        };
      }

      function createPetal(width, height) {
        return buildParticleState(width, height, false);
      }

      function resetPetal(petal, width, height) {
        var nextState = buildParticleState(width, height, true);

        for (var key in nextState) {
          if (nextState.hasOwnProperty(key)) {
            petal[key] = nextState[key];
          }
        }
      }

      function drawStar(ctx, size) {
        var outer = size;
        var inner = size * 0.45;
        var rot = Math.PI / 2 * 3;
        var step = Math.PI / 5;

        ctx.beginPath();
        ctx.moveTo(0, -outer);
        for (var i = 0; i < 5; i++) {
          ctx.lineTo(Math.cos(rot) * outer, Math.sin(rot) * outer);
          rot += step;
          ctx.lineTo(Math.cos(rot) * inner, Math.sin(rot) * inner);
          rot += step;
        }
        ctx.closePath();
        ctx.fill();
      }

      function drawPetal(ctx, petal, time) {
        var swayX = Math.sin(time * petal.swingSpeed + petal.swingOffset) * petal.swingRange;

        ctx.save();
        ctx.translate(petal.x + swayX, petal.y);

        // 이모지는 회전 안 하는 게 더 자연스러움
        // if (!petal.isEmoji) {
          ctx.rotate(petal.rotation);
        // }

        ctx.globalAlpha = petal.alpha;

        var s = petal.size;

        // 이모지 렌더링
        if (petal.isEmoji) {
          ctx.font = (s * 2.0) + "px serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(petal.emoji, 0, 0);
          ctx.restore();
          return;
        }

        ctx.fillStyle = petal.color;

        if (petal.shapeType === 'rect') {
          ctx.fillRect(-s * 0.45, -s * 0.6, s * 0.9, s * 1.2);
        } else if (petal.shapeType === 'circle') {
          ctx.beginPath();
          ctx.arc(0, 0, s * 0.55, 0, Math.PI * 2);
          ctx.fill();
        } else {
          drawStar(ctx, s * 0.8);
        }

        ctx.restore();
      }

      function updatePetals(width, height) {
        for (var i = 0; i < petals.length; i++) {
          var petal = petals[i];
          petal.y += petal.fallSpeed;
          petal.x += petal.driftSpeed;
          petal.rotation += petal.rotationSpeed;

          if (petal.y > height + 30 || petal.x < -40 || petal.x > width + 40) {
            resetPetal(petal, width);
          }
        }
      }

      function render(timestamp) {
        if (!running || !blossomCanvas) {
          return;
        }

        var ctx = blossomCanvas.getContext('2d');
        var width = window.innerWidth;
        var height = window.innerHeight;
        var time = timestamp * 0.05;

        ctx.clearRect(0, 0, width, height);
        updatePetals(width, height);

        for (var i = 0; i < petals.length; i++) {
          drawPetal(ctx, petals[i], time);
        }

        animationId = requestAnimationFrame(render);
      }

      window.startBlossomEffect = function (durationMs) {
        createCanvas();

        if (stopTimer) {
          clearTimeout(stopTimer);
          stopTimer = null;
        }

        petals = [];
        var count = Math.max(18, Math.floor(window.innerWidth / 55) * ratio);

        for (var i = 0; i < count; i++) {
          petals.push(createPetal(window.innerWidth, window.innerHeight));
        }

        if (!running) {
          running = true;
          animationId = requestAnimationFrame(render);
        }

        stopTimer = setTimeout(function () {
          window.stopBlossomEffect();
          setStatus('자동 종료 완료');
        }, durationMs || 15000);
      };

      window.stopBlossomEffect = function () {
        running = false;

        if (animationId) {
          cancelAnimationFrame(animationId);
          animationId = null;
        }

        if (stopTimer) {
          clearTimeout(stopTimer);
          stopTimer = null;
        }

        if (blossomCanvas && blossomCanvas.parentNode) {
          blossomCanvas.parentNode.removeChild(blossomCanvas);
          blossomCanvas = null;
        }

        petals = [];
      };
    })();
  </script>
</body>
</html>
